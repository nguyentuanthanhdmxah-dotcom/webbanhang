<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phone Store</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<div class="menu">☰</div>
<h2>📱 Phone Store</h2>
<input type="text" id="search" placeholder="Tìm điện thoại...">
<button onclick="toggleDark()">🌙</button>

<!-- 🛒 GIỎ HÀNG -->
<div class="cart-btn" onclick="toggleCart()">
🛒 <span id="count">0</span>
</div>

</header>

<div class="sidebar">
<h3>Danh mục</h3>
<ul>
<li onclick="filter('all')">Trang chủ</li>
<li onclick="filter('iphone')">iPhone</li>
<li onclick="filter('samsung')">Samsung</li>
<li onclick="filter('xiaomi')">Xiaomi</li>
<li onclick="filter('oppo')">Oppo</li>
<li onclick="filter('vivo')">Vivo</li>
</ul>
</div>

<div class="products" id="list"></div>

<!-- MODAL CHI TIẾT -->
<div class="modal" id="modal">
<div class="modal-content small">
<span onclick="closeModal()">✖</span>
<img id="mImg">
<h3 id="mName"></h3>
<p id="mPrice"></p>
<div id="mDesc"></div>
<button onclick="addCart()">Thêm vào giỏ</button>
</div>
</div>

<!-- GIỎ HÀNG -->
<div class="modal" id="cartModal">
<div class="modal-content">
<span onclick="closeCart()">✖</span>
<h3>🛒 Giỏ hàng</h3>
<div id="cart"></div>
<p id="total"></p>
<button onclick="checkout()">Đặt hàng</button>
</div>
</div>

<!-- FORM -->
<div class="modal" id="orderModal">
<div class="modal-content">
<h3>Thông tin đặt hàng</h3>
<input id="name" placeholder="Nhập tên">
<input id="phone" placeholder="Nhập SĐT">
<input id="address" placeholder="Nhập địa chỉ">
<p id="error" style="color:red"></p>
<button onclick="submitOrder()">Xác nhận</button>
<button onclick="closeOrder()">Hủy</button>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
